
server:
    port: 8080
spring:
    application:
        name: nacos-consumer
    cloud:
        nacos:
            discovery:
                # nacos服务地址
                server-addr: 127.0.0.1:8848
                # nacos登陆用户名
                username: nacos
                # nacos登陆密码
                password: nacos

logging:
    level:
        com:
            example: debug

management:
    endpoints:
        web:
            exposure:
                include: '*'