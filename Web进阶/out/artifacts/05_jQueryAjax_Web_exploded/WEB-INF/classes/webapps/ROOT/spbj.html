    <section id="main-content">
      <section class="wrapper mb30">
        <h3><i class="fa fa-angle-right"></i> 商品编辑 </h3>
        <div class="row mt">
          <div class="col-md-12">
            <div class="content-panel">
              <table class="table table-striped table-advance table-hover">
                <h4><i class="fa fa-angle-right"></i> 编辑商品
                  <input type="submit" data-toggle="modal" href="spbj.html#ttjspModal" class="btn btn-info" style="float: right;position: relative;top: -10px;right: 15px;" value="添加商品" />
                </h4>
                <hr>
                <thead>
                  <tr>
                    <th>编码</th>
                    <th>商品名称</th>
                    <th>商品类型</th>
                    <th>商品价格</th>
                    <th>是否上架</th>
                    <th>图1</th>
                    <th>图2</th>
                    <th>图3</th>
                    <th>详情图</th>
                    <th>店铺ID</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="bjsp"></tbody>
              </table>

              <div aria-hidden="true" aria-labelledby="xgnrLabel" role="dialog" tabindex="-1" id="xgnrModal" class="modal fade">
                <div class="modal-dialog">
                  <div class="modal-content">
                    <div class="modal-header">
                      <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
                      <h4 class="modal-title"> 编辑商品 </h4>
                    </div>
                    <div class="modal-body" id="xgnr">
                      <div class="bj-input-group"><label>商品名称</label><input id="bjQname" type="text" value=""></div>
                      <div class="bj-input-group"><label>商品类型</label><select id="bjQtype" class="producetype"></select></div>
                      <div class="bj-input-group"><label>商品价格</label><input id="bjQprice" type="text" value=""></div>
                      <div class="bj-input-group"><label>是否上架</label><select id="bjQlike"><option value="1">上架</option><option value="0">不上架</option></select></div>
                      <div class="bj-input-group"><label>图1</label>
                        <div class="oldimg showimgbox" id="img1Box"><img src="" onclick="showLarge(event,this)"></div>
                        <form id="img1Form"><input type="file" name="file" id="img1">
                          <p id="img1Url" class="urlbox"></p><input type="button" value="上传" onclick="doUpload(img1)"></form>
                      </div>
                      <div class="bj-input-group"><label>图2</label>
                        <div class="oldimg showimgbox" id="img2Box"><img src="" onclick="showLarge(event,this)"></div>
                        <form id="img2Form"><input type="file" name="file" id="img2">
                          <p id="img2Url" class="urlbox"></p><input type="button" value="上传" onclick="doUpload(img2)"></form>
                      </div>
                      <div class="bj-input-group"><label>图3</label>
                        <div class="oldimg showimgbox" id="img3Box"><img src="" onclick="showLarge(event,this)"></div>
                        <form id="img3Form"><input type="file" name="file" id="img3">
                          <p id="img3Url" class="urlbox"></p><input type="button" value="上传" onclick="doUpload(img3)"></form>
                      </div>
                      <div class="bj-input-group"><label>详情图</label>
                        <div class="oldimg showimgbox" id="imgdeBox"><img src="" onclick="showLarge(event,this)"></div>
                        <form id="imgdeForm"><input type="file" name="file" id="imgde">
                          <p id="imgdeUrl" class="urlbox"></p><input type="button" value="上传" onclick="doUpload(imgde)"></form>
                      </div>
                    </div>
                    <div class="modal-footer">
                      <button class="btn btn-theme qr" onclick="updateDetail(this)" bs="">提交</button>
                      <button data-dismiss="modal" class="btn btn-default qx">取消</button>
                    </div>
                  </div>
                </div>
              </div>

              <div aria-hidden="true" aria-labelledby="ttjspLabel" role="dialog" tabindex="-1" id="ttjspModal" class="modal fade">
                <div class="modal-dialog">
                  <div class="modal-content">
                    <div class="modal-header">
                      <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
                      <h4 class="modal-title"> 新增商品 </h4>
                    </div>
                    <div class="modal-body" id="ttjsp">
                      <div class="bj-input-group"><label>商品名称</label><input id="tjQname" type="text" value=""></div>
                      <div class="bj-input-group"><label>商品类型</label><select id="tjQtype" class="producetype"></select></div>
                      <div class="bj-input-group"><label>商品价格</label><input id="tjQprice" type="text" value=""></div>
                      <div class="bj-input-group"><label>是否上架</label>
                        <select id="tjQlike">
                          <option value="1">上架</option>
                          <option value="0">不上架</option>
                        </select>
                      </div>
                      <div class="bj-input-group"><label>图1</label>
                        <div class="oldimg showimgbox" id="tjimg1Box"><img src="" onclick="showLarge(event,this)"></div>
                        <form id="tjimg1Form"><input type="file" name="file" id="tjimg1">
                          <p id="tjimg1Url" class="urlbox"></p><input type="button" value="上传" onclick="doUpload(tjimg1)"></form>
                      </div>
                      <div class="bj-input-group"><label>图2</label>
                        <div class="oldimg showimgbox" id="tjimg2Box"><img src="" onclick="showLarge(event,this)"></div>
                        <form id="tjimg2Form"><input type="file" name="file" id="tjimg2">
                          <p id="tjimg2Url" class="urlbox"></p><input type="button" value="上传" onclick="doUpload(tjimg2)"></form>
                      </div>
                      <div class="bj-input-group"><label>图3</label>
                        <div class="oldimg showimgbox" id="tjimg3Box"><img src="" onclick="showLarge(event,this)"></div>
                        <form id="tjimg3Form"><input type="file" name="file" id="tjimg3">
                          <p id="tjimg3Url" class="urlbox"></p><input type="button" value="上传" onclick="doUpload(tjimg3)"></form>
                      </div>
                      <div class="bj-input-group"><label>详情图</label>
                        <div class="oldimg showimgbox" id="tjimgdeBox"><img src="" onclick="showLarge(event,this)"></div>
                        <form id="tjimgdeForm"><input type="file" name="file" id="tjimgde">
                          <p id="tjimgdeUrl" class="urlbox"></p><input type="button" value="上传" onclick="doUpload(tjimgde)"></form>
                      </div>
                    </div>
                    <div class="modal-footer">
                      <button class="btn btn-theme qr" id="tjsp" bs="">提交</button>
                      <button data-dismiss="modal" class="btn btn-default qx">取消</button>
                    </div>
                  </div>
                </div>
              </div>

              <div aria-hidden="true" aria-labelledby="splbLabel" role="dialog" tabindex="-1" id="splbModal" class="modal fade">
                <div class="modal-dialog">
                  <div class="modal-content">
                    <div class="modal-header">
                      <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
                      <h4 class="modal-title"> 商品类别 </h4>
                    </div>
                    <div class="modal-body" id="splbbox"></div>
                    <div class="modal-footer">
                      <button class="btn btn-theme qr" bs="">选择</button>
                      <button data-dismiss="modal" class="btn btn-default qx">取消</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
