<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">

  <title>登陆</title>


  <link href="assets/css/bootstrap.css" rel="stylesheet">
  <link href="assets/font-awesome/css/font-awesome.css" rel="stylesheet" />
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/style-responsive.css" rel="stylesheet">

  <!-- HTML5 shim and Respond.js IE8 support of HTML5 elements and media queries -->
  <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
      <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>

<body>
  <div id="login-page">
    <div class="container">
      <div class="login-text">
        <h2>美易团企业微信小程序一站式服务平台</h2>
        <hr>
        <p>石泉县美易团电子商务首创微信营销行业解决方案，依托微信小程序平台，为企业和未来发展新零售重新定义小程序格局，解决了实体商铺线下和线上互动，拉取了用户购物距离，营销难等问题。</p>
      </div>
      <div class="form-login">
        <h2 class="form-login-heading">登 陆</h2>
        <div class="login-wrap">
          <input id="username" type="text" class="form-control" placeholder="用户名" autofocus>
          <br>
          <input id="password" type="password" class="form-control" placeholder="密码">
          <label class="checkbox">
		        <span class="pull-right">
		          <a data-toggle="modal" href="login.html#myModal"> 忘记密码? </a>
		        </span>
		      </label>
          <button id="login-btn" class="btn btn-theme btn-block" onclick="loginindex();"><i class="fa fa-lock"></i> 登 陆 </button>
        </div>
        <div aria-hidden="true" aria-labelledby="myModalLabel" role="dialog" tabindex="-1" id="myModal" class="modal fade">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
                <h4 class="modal-title"> 忘记密码?</h4>
              </div>
              <div class="modal-body">
                <p>请输入注册账号的油箱地址</p>
                <input type="text" name="email" placeholder="Email" autocomplete="off" class="form-control placeholder-no-fix">

              </div>
              <div class="modal-footer">
                <button data-dismiss="modal" class="btn btn-default" type="button">取消</button>
                <button class="btn btn-theme" type="button">提交</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <footer class="login-footer">
        <p>
          ©2017&nbsp;陕ICP备17018259号&nbsp;
          <a id="jgwab" target="_blank" href="http://www.beian.gov.cn/portal/registerSystemInfo?recordcode=61092202000106">公安机关备61092202000106号</a></p>
      </footer>
    </div>
  </div>
  <script src="assets/js/jquery.js"></script>
  <script src="assets/js/bootstrap.min.js"></script>
  <script src="main.js"></script>
  <script type="text/javascript" src="assets/js/jquery.backstretch.min.js"></script>
  <script>
    $.backstretch("assets/img/timg.jpg", {
      speed: 500
    });
  </script>
</body>

</html>
