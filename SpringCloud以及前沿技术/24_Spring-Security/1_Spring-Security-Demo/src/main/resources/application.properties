
spring.datasource.url=jdbc:mysql://localhost:3306/sys?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=131474
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# mybatis 打印日志
#logging.level.com.yy.mp.mapper=debug123

# mybatis-plus 使用了 org.apache.ibatis.logging.stdout.StdOutImpl 这个实现类，将日志输出到标准输出流（即控制台）。
# 这样可以方便地查看 MyBatis-Plus 内部的执行情况和 SQL 执行情况，便于调试和排查问题。
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
#mybatis-plus.configuration.log-level=debug
mybatis-plus.configuration.log-prefix=debug

# Redis 默认端口就是6379

# thymeleaf缓存
spring.thymeleaf.cache=false

# thymeleaf前后缀
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html


